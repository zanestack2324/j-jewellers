<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>J JEWELLERS — Admin Dashboard</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --admin-bg:#041515;--admin-surface:#0A2E2E;--admin-surface-2:#081E1E;
  --admin-border:rgba(13,139,139,0.12);--admin-border-light:rgba(48,197,197,0.2);
  --admin-text:#FFFFFF;--admin-text-muted:#88B5B5;--admin-text-dim:#558080;
  --admin-accent:#0D8B8B;--admin-accent-light:#30C5C5;--admin-accent-dark:#087070;
  --admin-success:#2ECC71;--admin-warning:#F39C12;--admin-danger:#E74C3C;--admin-info:#3498DB;
  --admin-sidebar:260px;--admin-radius:12px;--admin-ease:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(160deg,#041515 0%,#0A2E2E 30%,#081E1E 60%,#051818 100%);background-attachment:fixed;
  color:var(--admin-text);display:flex;min-height:100vh;overflow-x:hidden;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--admin-bg);}
::-webkit-scrollbar-thumb{background:var(--admin-accent);border-radius:2px;box-shadow:0 0 8px rgba(13,139,139,0.3);}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:inherit;outline:none;}
input{font-family:inherit;outline:none;}
img{max-width:100%;display:block;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:10000;background:linear-gradient(160deg,#041515 0%,#0A2E2E 30%,#081E1E 60%,#051818 100%);display:flex;align-items:center;justify-content:center;}
#loginScreen.hidden{display:none;}
.login-box{width:400px;max-width:90vw;padding:48px 40px;background:rgba(10,46,46,0.6);backdrop-filter:blur(20px);border:1px solid var(--admin-border);border-radius:var(--admin-radius);box-shadow:0 0 40px rgba(13,139,139,0.1);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo img{height:70px;margin:0 auto 12px;}
.login-logo h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;}
.login-logo p{color:var(--admin-text-muted);font-size:0.7rem;font-weight:400;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.login-form .form-group{margin-bottom:20px;}
.login-form label{display:block;font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--admin-text-muted);margin-bottom:8px;}
.login-form input{width:100%;padding:14px 18px;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);color:var(--admin-text);font-size:0.9rem;border-radius:8px;transition:all 0.3s var(--admin-ease);}
.login-form input:focus{border-color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.2);}
.login-form input::placeholder{color:var(--admin-text-dim);}
.login-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--admin-accent-light),var(--admin-accent),var(--admin-accent-dark));border:none;color:var(--admin-bg);font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:8px;transition:all 0.4s var(--admin-ease);}
.login-btn:hover{box-shadow:0 0 25px rgba(48,197,197,0.5);transform:translateY(-2px);}
.login-btn:active{box-shadow:0 0 35px rgba(48,197,197,0.7);transform:translateY(0);}
.login-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
.login-error{color:var(--admin-danger);font-size:0.75rem;margin-top:12px;display:none;}
.login-debug{color:var(--admin-accent-light);font-size:0.65rem;margin-top:6px;display:none;word-break:break-all;}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--admin-sidebar);background:rgba(8,30,30,0.85);backdrop-filter:blur(20px);border-right:1px solid var(--admin-border);z-index:100;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-header{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--admin-border);}
.sidebar-header img{height:40px;width:auto;}
.sidebar-header h2{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;line-height:1.2;}
.sidebar-header h2 span{display:block;font-family:'Inter',sans-serif;font-size:0.5rem;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--admin-text-muted);margin-top:2px;}
.sidebar-nav{flex:1;padding:8px;}
.nav-section{color:var(--admin-text-dim);font-size:0.55rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:20px 16px 8px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:2px;color:var(--admin-text-muted);font-size:0.8rem;font-weight:400;border-radius:8px;transition:all 0.3s var(--admin-ease);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;}
.nav-item:hover{background:rgba(13,139,139,0.08);color:var(--admin-text);}
.nav-item.active{background:rgba(13,139,139,0.15);color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.15);}
.nav-item:active{transform:scale(0.98);box-shadow:0 0 20px rgba(13,139,139,0.2);}
.nav-item .icon{width:18px;height:18px;flex-shrink:0;opacity:0.6;}
.nav-item.active .icon{opacity:1;}
.nav-item .badge{margin-left:auto;padding:2px 10px;font-size:0.6rem;font-weight:600;background:var(--admin-accent);color:var(--admin-bg);border-radius:20px;}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--admin-border);}
.sidebar-footer .admin-info{display:flex;align-items:center;gap:10px;padding:10px 6px;}
.sidebar-footer .admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--admin-accent),var(--admin-accent-dark));display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--admin-bg);}
.sidebar-footer .admin-name{font-size:0.75rem;font-weight:500;}
.sidebar-footer .admin-role{font-size:0.6rem;color:var(--admin-text-muted);}

/* MAIN */
#main{margin-left:var(--admin-sidebar);flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{padding:16px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--admin-border);position:sticky;top:0;z-index:50;background:rgba(4,21,21,0.85);backdrop-filter:blur(20px);}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-left h2{font-size:1.15rem;font-weight:600;}
.topbar-left .page-breadcrumb{font-size:0.7rem;color:var(--admin-text-muted);letter-spacing:1px;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-right .top-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);color:var(--admin-text-muted);border-radius:8px;font-size:0.85rem;cursor:pointer;transition:all 0.3s var(--admin-ease);}
.topbar-right .top-btn:hover{border-color:var(--admin-accent);color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.25);}
.topbar-right .top-btn:active{transform:scale(0.95);box-shadow:0 0 20px rgba(13,139,139,0.35);}
.hamburger-admin{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);color:var(--admin-text-muted);border-radius:8px;cursor:pointer;font-size:1.2rem;transition:all 0.3s var(--admin-ease);}
.hamburger-admin:hover{border-color:var(--admin-accent);color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.25);}
#content{padding:32px;flex:1;}

/* CARDS */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:32px;}
.dash-card{padding:24px;background:rgba(10,46,46,0.5);backdrop-filter:blur(10px);border:1px solid var(--admin-border);border-radius:var(--admin-radius);transition:all 0.4s var(--admin-ease);}
.dash-card:hover{border-color:var(--admin-accent);transform:translateY(-2px);box-shadow:0 0 20px rgba(13,139,139,0.15);}
.dash-card .dash-label{font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--admin-text-muted);margin-bottom:8px;}
.dash-card .dash-value{font-size:2rem;font-weight:700;line-height:1.1;}
.dash-card .dash-change{font-size:0.7rem;margin-top:6px;display:flex;align-items:center;gap:4px;}
.dash-card .dash-change.up{color:var(--admin-success);}
.dash-card .dash-change.down{color:var(--admin-danger);}
.dash-card .dash-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:rgba(13,139,139,0.1);border-radius:8px;margin-bottom:12px;box-shadow:0 0 12px rgba(13,139,139,0.1);}

.card{background:rgba(10,46,46,0.5);backdrop-filter:blur(10px);border:1px solid var(--admin-border);border-radius:var(--admin-radius);margin-bottom:20px;}
.card-header{padding:20px 24px;border-bottom:1px solid var(--admin-border);display:flex;justify-content:space-between;align-items:center;}
.card-header h4{font-size:0.85rem;font-weight:600;}
.card-body{padding:24px;}
.card-body.no-padding{padding:0;}

.data-table{width:100%;}
.data-table th{padding:14px 20px;text-align:left;font-size:0.6rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--admin-text-muted);border-bottom:1px solid var(--admin-border);}
.data-table td{padding:14px 20px;font-size:0.8rem;font-weight:400;border-bottom:1px solid var(--admin-border);color:var(--admin-text);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,0.02);}

.status-badge{padding:4px 14px;font-size:0.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-radius:20px;display:inline-block;}
.status-badge.active,.status-badge.approved,.status-badge.paid,.status-badge.in_stock,.status-badge.completed,.status-badge.delivered{background:rgba(46,204,113,0.12);color:var(--admin-success);}
.status-badge.processing,.status-badge.pending,.status-badge.low_stock{background:rgba(243,156,18,0.12);color:var(--admin-warning);}
.status-badge.inactive,.status-badge.rejected,.status-badge.unpaid,.status-badge.out_of_stock,.status-badge.cancelled{background:rgba(231,76,60,0.12);color:var(--admin-danger);}
.status-badge.shipped{background:rgba(52,152,219,0.12);color:var(--admin-info);}

.btn-admin{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;transition:all 0.3s var(--admin-ease);border-radius:8px;}
.btn-primary-admin{background:linear-gradient(135deg,var(--admin-accent-light),var(--admin-accent),var(--admin-accent-dark));color:var(--admin-bg);}
.btn-primary-admin:hover{box-shadow:0 0 20px rgba(48,197,197,0.4);transform:translateY(-1px);}
.btn-primary-admin:active{transform:translateY(0);box-shadow:0 0 30px rgba(48,197,197,0.6);}
.btn-secondary-admin{background:rgba(255,255,255,0.03);border:1px solid var(--admin-border);color:var(--admin-text);}
.btn-secondary-admin:hover{border-color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.2);}
.btn-secondary-admin:active{background:rgba(13,139,139,0.1);box-shadow:0 0 20px rgba(13,139,139,0.3);}
.btn-danger-admin{background:rgba(231,76,60,0.12);color:var(--admin-danger);}
.btn-danger-admin:hover{background:rgba(231,76,60,0.2);box-shadow:0 0 15px rgba(231,76,60,0.3);}
.btn-danger-admin:active{box-shadow:0 0 25px rgba(231,76,60,0.4);}
.btn-sm,.btn-sm-admin{padding:6px 14px;font-size:0.55rem;letter-spacing:1px;}
.btn-xs-admin{padding:4px 10px;font-size:0.5rem;letter-spacing:0.5px;}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--admin-text-muted);margin-bottom:6px;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);color:var(--admin-text);font-size:0.85rem;border-radius:8px;transition:all 0.3s var(--admin-ease);}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.2);}
.form-group textarea{min-height:100px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.section-header h3{font-size:1.1rem;font-weight:600;}

.search-input{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);border-radius:8px;max-width:300px;}
.search-input input{flex:1;background:transparent;border:none;color:var(--admin-text);font-size:0.8rem;}
.search-input:focus-within{border-color:var(--admin-accent);box-shadow:0 0 15px rgba(13,139,139,0.2);}

.empty-state{text-align:center;padding:48px 24px;color:var(--admin-text-muted);}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.3;}
.empty-state p{font-size:0.9rem;}
.empty-state .sub{font-size:0.75rem;margin-top:6px;}

.modal-overlay-admin{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;}
.modal-overlay-admin.open{display:flex;}
.modal-admin{width:600px;max-width:90vw;max-height:90vh;overflow-y:auto;background:rgba(8,30,30,0.97);backdrop-filter:blur(30px);border:1px solid var(--admin-accent);border-radius:var(--admin-radius);padding:32px;box-shadow:0 0 40px rgba(13,139,139,0.2);scroll-behavior:smooth;}
.modal-admin h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px;}
.modal-admin .close-modal{float:right;background:none;border:none;color:var(--admin-text-muted);font-size:1.2rem;cursor:pointer;}
.modal-admin .close-modal:hover{color:var(--admin-text);}

.chart-container{height:250px;position:relative;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:200px;padding:20px 0;}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--admin-accent),var(--admin-accent-dark));min-height:4px;position:relative;transition:height 0.6s var(--admin-ease);}
.bar-label{font-size:0.55rem;color:var(--admin-text-muted);text-align:center;white-space:nowrap;}
.bar-value{font-size:0.55rem;color:var(--admin-text-muted);}

.admin-tabs{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap;}
.admin-tab{padding:10px 20px;font-size:0.65rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:transparent;border:1px solid var(--admin-border);color:var(--admin-text-muted);border-radius:8px;cursor:pointer;transition:all 0.3s var(--admin-ease);}
.admin-tab:hover{border-color:var(--admin-accent);color:var(--admin-text);box-shadow:0 0 12px rgba(13,139,139,0.15);}
.admin-tab.active{border-color:var(--admin-accent);color:var(--admin-accent);background:rgba(13,139,139,0.08);box-shadow:0 0 18px rgba(13,139,139,0.2);}

.toast-admin{position:fixed;top:24px;right:24px;z-index:9999;padding:14px 24px;background:rgba(8,30,30,0.97);backdrop-filter:blur(20px);border:1px solid var(--admin-border-light);color:var(--admin-text);font-size:0.8rem;border-radius:8px;animation:toastSlide 0.4s var(--admin-ease);display:flex;align-items:center;gap:10px;max-width:400px;}
.toast-admin.success{border-color:rgba(46,204,113,0.3);box-shadow:0 0 20px rgba(46,204,113,0.15);}
.toast-admin.error{border-color:rgba(231,76,60,0.3);box-shadow:0 0 20px rgba(231,76,60,0.15);}
@keyframes toastSlide{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

/* ═══ iOS-style Bottom Nav ═══ */
#sidebarOverlay{display:none;}
#bottomNav{display:none;}

@media(max-width:1024px){
  #sidebar{transform:translateX(-100%);transition:transform 0.4s var(--admin-ease);z-index:200;}
  #sidebar.open{transform:translateX(0);z-index:350;}
  #sidebar.open ~ #sidebarOverlay,
  #sidebar.open + #sidebarOverlay {display:block!important}
  #main{margin-left:0;}
  .hamburger-admin{display:flex;}
  .sidebar-footer{display:none;}
  #sidebarOverlay{display:none;position:fixed;inset:0;z-index:340;background:rgba(0,0,0,0.5);}
  #content{padding:20px;padding-bottom:96px;}
  .topbar{padding:12px 20px;}

  /* iOS pill bar — glassmorphism, floating */
  #bottomNav{display:flex;position:fixed;bottom:16px;left:12px;right:12px;z-index:300;background:rgba(17,17,20,0.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.08);border-radius:36px;padding:5px 6px;justify-content:space-evenly;align-items:center;box-shadow:0 8px 40px rgba(0,0,0,0.7),0 2px 12px rgba(13,139,139,0.1);}

  .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;padding:4px 2px;background:none;border:none;color:#777;font-size:0.4rem;cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);border-radius:20px;position:relative;letter-spacing:0.3px;}

  .bnav-item .bnav-icon{font-size:1.3rem;width:40px;height:24px;display:flex;align-items:center;justify-content:center;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);}

  .bnav-item .bnav-label{font-size:0.4rem;font-weight:600;opacity:0;transition:opacity 0.25s;height:0;overflow:hidden;margin-top:0;}

  .bnav-item.active{background:rgba(13,139,139,0.12);}
  .bnav-item.active .bnav-icon{font-size:1.75rem;color:var(--admin-accent-light);text-shadow:0 0 16px rgba(30,197,197,0.5);animation:iosBounce 0.35s cubic-bezier(0.34,1.56,0.64,1);}
  .bnav-item.active .bnav-label{opacity:1;height:auto;margin-top:1px;color:var(--admin-accent-light);}

  .bnav-item:not(.active) .bnav-icon{color:#777;}

  @keyframes iosBounce {
    0% { transform:scale(1); }
    45% { transform:scale(1.4); }
    70% { transform:scale(0.9); }
    100% { transform:scale(1); }
  }
}

@media(max-width:768px){
  .form-row{grid-template-columns:1fr;}
  .topbar-left h2{font-size:0.95rem;}
  .dash-card .dash-value{font-size:1.5rem;}
  .data-table .th-stock,.data-table .td-stock,.data-table .th-status,.data-table .td-status{display:none;}
  .data-table td{padding:10px 12px;}
  .data-table .td-actions{min-width:120px;}
  .data-table .td-actions .flex{flex-direction:column;gap:4px;}
  .data-table .td-actions .btn-admin{width:100%;justify-content:center;padding:6px 8px;}
  .variant-row{grid-template-columns:1fr 1fr;gap:10px;}
}

.hidden{display:none!important;}
.flex{display:flex;}
.flex-wrap{flex-wrap:wrap;}
.gap-8{gap:8px;}
.gap-12{gap:12px;}
.gap-16{gap:16px;}
.items-center{align-items:center;}
.justify-between{justify-content:space-between;}
.mt-8{margin-top:8px;}
.mt-16{margin-top:16px;}
.mb-16{margin-bottom:16px;}
.mb-24{margin-bottom:24px;}
.w-full{width:100%;}
.text-muted{color:var(--admin-text-muted);}
.text-sm{font-size:0.75rem;}
.text-xs{font-size:0.65rem;}
.font-mono{font-family:'Courier New',monospace;font-size:0.75rem;}

/* VARIANT MANAGEMENT */
.variant-section{margin-top:16px;border-top:2px solid var(--admin-accent);padding-top:16px;background:rgba(13,139,139,0.04);border-radius:8px;padding:16px;margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px;}
.variant-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.variant-section-header h4{font-size:0.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--admin-text-muted);}
.variant-row{display:grid;grid-template-columns:80px 1fr 1fr 100px 100px 1fr 40px;gap:8px;align-items:end;padding:10px 12px;background:rgba(13,139,139,0.04);border:1px solid var(--admin-border);border-radius:8px;margin-bottom:8px;}
.variant-row label{display:block;font-size:0.55rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--admin-text-dim);margin-bottom:4px;}
.variant-row input,.variant-row select{width:100%;padding:8px 10px;background:rgba(13,139,139,0.05);border:1px solid var(--admin-border);color:var(--admin-text);font-size:0.8rem;border-radius:6px;}
.variant-row input:focus,.variant-row select:focus{border-color:var(--admin-accent);box-shadow:0 0 10px rgba(13,139,139,0.15);}
.variant-color-input{display:flex;align-items:center;gap:6px;}
.variant-color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--admin-border-light);cursor:pointer;flex-shrink:0;}
.variant-color-swatch input[type="color"]{opacity:0;position:absolute;width:28px;height:28px;cursor:pointer;}
.variant-remove-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2);color:var(--admin-danger);border-radius:6px;cursor:pointer;font-size:1rem;transition:all 0.2s;}
.variant-remove-btn:hover{background:var(--admin-danger);color:#fff;}
.variant-img-preview{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--admin-border);margin-top:4px;}
.add-variant-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(13,139,139,0.08);border:1px dashed var(--admin-border-light);color:var(--admin-accent-light);border-radius:8px;cursor:pointer;font-size:0.75rem;font-weight:500;transition:all 0.2s;}
.add-variant-btn:hover{background:rgba(13,139,139,0.15);border-color:var(--admin-accent);}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="../imgi_2_head-logo.webp" alt="J JEWELLERS" />
      <h1>J JEWELLERS</h1>
      <p>Admin Portal</p>
    </div>
    <form class="login-form" id="loginForm" autocomplete="on">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>

      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      <p class="login-error" id="loginError"></p>
      <p class="login-debug" id="loginDebug"></p>
    </form>
  </div>
</div>

<!-- ═══ SIDEBAR ═══ -->
<aside id="sidebar" class="hidden">
  <div class="sidebar-header">
    <img src="../imgi_2_head-logo.webp" alt="J JEWELLERS" />
    <div>
      <h2>J JEWELLERS <span>Admin Panel</span></h2>
    </div>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="admin-info">
      <div class="admin-avatar">A</div>
      <div>
        <div class="admin-name">Admin</div>
        <div class="admin-role">Super Admin</div>
      </div>
    </div>
  </div>
</aside>
<div id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ═══ MAIN ═══ -->
<div id="main" class="hidden">
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger-admin" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="page-breadcrumb" id="breadcrumb">Dashboard</div>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
    </div>
    <div class="topbar-right">
      <button class="top-btn" onclick="logoutAdmin()" title="Sign Out">⏻</button>
    </div>
  </header>
  <div id="content"></div>
</div>

<!-- ═══ BOTTOM NAV (mobile) ═══ -->
<nav id="bottomNav">
  <button class="bnav-item" data-bnav="menu" onclick="toggleSidebar()" title="Menu">
    <span class="bnav-icon">☰</span>
    <span>Menu</span>
  </button>
  <button class="bnav-item active" data-bnav="dashboard" onclick="navigateTo('dashboard')" title="Dashboard">
    <span class="bnav-icon">◉</span>
    <span>Home</span>
  </button>
  <button class="bnav-item" data-bnav="orders" onclick="navigateTo('orders')" title="Orders">
    <span class="bnav-icon">◈</span>
    <span>Orders</span>
  </button>
  <button class="bnav-item" data-bnav="customers" onclick="navigateTo('customers')" title="Customers">
    <span class="bnav-icon">◉</span>
    <span>Customers</span>
  </button>
  <button class="bnav-item" data-bnav="products" onclick="navigateTo('products')" title="Products">
    <span class="bnav-icon">◈</span>
    <span>Products</span>
  </button>
</nav>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay-admin" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-admin" id="modalContent"></div>
</div>

<script>
// ═══ STATE ═══
var STATE = {
  token: '',
  currentPage: 'dashboard',
  products: []
};

// ═══ LOGGING ═══
function log() {}

// ═══ API CALL ═══
function api(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['X-Admin-Token'] = STATE.token;
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    opts.body = JSON.stringify(opts.body);
    opts.headers['Content-Type'] = 'application/json';
  }
  log('API: ' + url + ' method=' + (opts.method || 'GET'));
  return fetch(url, opts).then(function(r) {
    log('API response: ' + url + ' status=' + r.status);
    return r.text().then(function(text) {
      var data;
      try { data = JSON.parse(text); } catch(e) { data = { error: 'Invalid server response' }; }
      log('API data: ' + url + ' ' + JSON.stringify(data).slice(0, 200));
      if (!r.ok) { throw new Error(data.error || 'Server error ' + r.status); }
      return data;
    });
  }).catch(function(err) {
    log('API error: ' + url + ' ' + err.message);
    throw err;
  });
}

// ═══ CLIENT-SIDE IMAGE COMPRESSION ═══
function compressImage(file, maxDim, quality) {
  return new Promise(function(resolve) {
    maxDim = maxDim || 800;
    quality = quality || 0.7;
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = function() { resolve(e.target.result); };
      img.src = e.target.result;
    };
    reader.onerror = function() { resolve(''); };
    reader.readAsDataURL(file);
  });
}

// ═══ LOGIN ═══
function loginAdmin(username, password) {
  var btn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginError');
  var dbgEl = document.getElementById('loginDebug');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';
  dbgEl.style.display = 'none';
  log('1. Submitting login for user: ' + username);
  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username, password: password })
  }).then(function(r){
    log('2. Login response status: ' + r.status);
    return r.json();
  }).then(function(data){
    log('3. Login response body: ' + JSON.stringify(data));
    if (data.success && data.token) {
      log('4. Login OK, token received, length=' + data.token.length);
      STATE.token = data.token;
      localStorage.setItem('jj_admin_token', data.token);
      log('5. Token saved to localStorage');
      // Verify token works by calling check endpoint
      log('6. Verifying token via check endpoint…');
      return api('/api/admin/login', { method: 'POST', body: { action: 'check' } }).then(function(checkData){
        log('7. Token check result: ' + JSON.stringify(checkData));
        if (checkData && checkData.success) {
          log('8. Token verified. Loading dashboard…');
          enterDashboard();
        } else {
          log('8. Token check failed. Token might be invalid.');
          errEl.textContent = 'Token verification failed. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });
    } else {
      log('4. Login failed: ' + (data.error || 'unknown error'));
      errEl.textContent = data.error || 'Invalid credentials. Try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }).catch(function(err){
    log('ERROR: ' + err.message);
    dbgEl.textContent = 'Network error: ' + err.message;
    dbgEl.style.display = 'block';
    errEl.textContent = 'Cannot connect to server. Check your internet.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  });
}

// ═══ ENTER DASHBOARD ═══
function enterDashboard() {
  log('Entering dashboard…');
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('main').classList.remove('hidden');
  renderSidebar();
  navigateTo('dashboard');
}

// ═══ LOGOUT ═══
function logoutAdmin() {
  log('Logging out…');
  STATE.token = '';
  localStorage.removeItem('jj_admin_token');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('main').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('content').innerHTML = '';
}

// ═══ SIDEBAR ═══
var navSections = [
  { section: 'Overview', items: [
    { id: 'dashboard', label: 'Dashboard', icon: '◉' }
  ]},
  { section: 'Sales', items: [
    { id: 'orders', label: 'Orders', icon: '◈' },
    { id: 'customers', label: 'Customers', icon: '◉' },
    { id: 'coupons', label: 'Discounts', icon: '⊞' }
  ]},
  { section: 'Manage', items: [
    { id: 'products', label: 'Products', icon: '◈' },
    { id: 'categories', label: 'Categories', icon: '⊞' },
    { id: 'reviews', label: 'Reviews', icon: '★' }
  ]},
  { section: 'Finance', items: [
    { id: 'payments', label: 'Stripe', icon: '◈' },
    { id: 'shipping', label: 'Shipping', icon: '⊞' }
  ]},
  { section: 'Engage', items: [
    { id: 'contacts', label: 'Enquiries', icon: '✉' }
  ]},
  { section: 'System', items: [
    { id: 'settings', label: 'Settings', icon: '⚙' }
  ]}
];

function renderSidebar() {
  var nav = document.getElementById('sidebarNav');
  var html = '';
  navSections.forEach(function(section){
    html += '<div class="nav-section">' + section.section + '</div>';
    section.items.forEach(function(item){
      html += '<button class="nav-item" data-page="' + item.id + '" onclick="navigateTo(\'' + item.id + '\')"><span class="icon">' + item.icon + '</span>' + item.label + '</button>';
    });
  });
  nav.innerHTML = html;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══ NAVIGATION ═══
function navigateTo(page) {
  STATE.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-page') === page); });
  document.getElementById('sidebar').classList.remove('open');
  // Update bottom nav active state
  document.querySelectorAll('.bnav-item').forEach(function(n){ n.classList.toggle('active', n.getAttribute('data-bnav') === page); });
  renderPage(page);
}

function getPageTitle(page) {
  var titles = {
    dashboard: 'Dashboard',
    products: 'Products',
    categories: 'Categories',
    orders: 'Orders',
    customers: 'Customers',
    coupons: 'Discounts & Coupons',
    reviews: 'Reviews',
    contacts: 'Enquiries',
    payments: 'Payments (Stripe)',
    shipping: 'Shipping',
    settings: 'Settings'
  };
  return titles[page] || 'Dashboard';
}

function renderPage(page) {
  document.getElementById('pageTitle').textContent = getPageTitle(page);
  document.getElementById('breadcrumb').textContent = page === 'dashboard' ? 'Overview' : 'Admin / ' + getPageTitle(page);
  var content = document.getElementById('content');
  content.innerHTML = '<p class="text-muted" style="padding:24px;text-align:center;">Loading ' + getPageTitle(page) + '…</p>';
  switch(page) {
    case 'dashboard': renderDashboard(content); break;
    case 'products': renderProducts(content); break;
    case 'categories': renderCategories(content); break;
    case 'orders': renderOrders(content); break;
    case 'customers': renderCustomers(content); break;
    case 'coupons': renderCoupons(content); break;
    case 'reviews': renderReviews(content); break;
    case 'contacts': renderContacts(content); break;
    case 'payments': renderPayments(content); break;
    case 'shipping': renderShipping(content); break;
    case 'settings': renderSettings(content); break;
    default: content.innerHTML = '<div class="empty-state"><div class="empty-icon">◉</div><h4>Page Not Found</h4><p class="sub">The requested page does not exist.</p></div>';
  }
}

// ═══ DASHBOARD ═══
function renderDashboard(el) {
  Promise.all([
    api('/api/admin/dashboard').catch(function(){ return null; }),
    api('/api/admin/upload', { method: 'POST', body: { _check: true } }).then(function(d){ return d; }).catch(function(){ return { error: 'unreachable' }; }),
    api('/api/admin/orders').catch(function(){ return []; }),
    api('/api/admin/customers').catch(function(){ return []; }),
    api('/api/admin/reviews').catch(function(){ return []; }),
    api('/api/admin/coupons').catch(function(){ return []; }),
    api('/api/admin/contacts').catch(function(){ return []; })
  ]).then(function(results) {
    var data = results[0];
    var uploadStatus = results[1];
    var orders = results[2] || [];
    var customers = results[3] || [];
    var reviews = results[4] || [];
    var coupons = results[5] || [];
    var contacts = results[6] || [];
    var githubOk = uploadStatus && uploadStatus.success && uploadStatus.configured !== false;
    if (!data) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">◉</div><h4>No Data</h4><p class="sub">Could not load dashboard.</p></div>'; return; }
    var d = data.overview || {};
    var r = data.revenue || {};
    var sb = data.stripeBalance || {};
    var pendingOrders = orders.filter(function(o){ return o.status === 'pending'; }).length;
    var totalRevenue = 0; orders.forEach(function(o){ totalRevenue += o.total || 0; });
    var unreadContacts = contacts.filter(function(s){ return !s.read; }).length;
    var html = '<div class="dash-grid">';
    var cards = [
      { label: 'Available Balance', value: (sb.currency || 'gbp').toUpperCase() + ' ' + (sb.available || 0).toFixed(2), change: 'Stripe account', icon: '\u00A3', page: 'payments' },
      { label: 'Total Revenue', value: '\u00A3' + totalRevenue.toFixed(2), change: orders.length + ' orders total', icon: '\u00A3', page: 'orders' },
      { label: 'Orders', value: orders.length, change: pendingOrders + ' pending', icon: '◈', page: 'orders' },
      { label: 'Customers', value: customers.length, change: 'registered', icon: '◉', page: 'customers' },
      { label: 'Products', value: d.totalProducts || 0, change: (d.totalProducts || 0) + ' listed', icon: '◆', page: 'products' },
      { label: 'Reviews', value: reviews.length, change: reviews.filter(function(r){ return r.status === 'pending'; }).length + ' pending', icon: '★', page: 'reviews' },
      { label: 'Coupons', value: coupons.length, change: coupons.filter(function(c){ return c.active; }).length + ' active', icon: '⊞', page: 'coupons' },
      { label: 'Enquiries', value: contacts.length, change: unreadContacts + ' unread', icon: '✉', page: 'contacts' }
    ];
    cards.forEach(function(c){
      html += '<div class="dash-card" style="cursor:pointer;" onclick="navigateTo(\'' + c.page + '\')"><div class="dash-icon">' + c.icon + '</div><div class="dash-label">' + c.label + '</div><div class="dash-value">' + c.value + '</div>' + (c.change ? '<div class="dash-change up">' + c.change + '</div>' : '') + '</div>';
    });
    html += '</div>';
    if (!githubOk) {
      html += '<div class="card" style="border-left:3px solid #e74c3c;"><div class="card-body"><p style="color:#e74c3c;font-weight:600;">GitHub Not Connected</p><p class="text-muted text-sm" style="margin-top:4px;">Set the <code>GITHUB_TOKEN</code> environment variable in Vercel to enable image uploads and data sync.</p></div></div>';
    } else {
      html += '<div class="card" style="border-left:3px solid #2ecc71;"><div class="card-body"><p style="color:#2ecc71;font-weight:600;">GitHub Connected</p><p class="text-muted text-sm" style="margin-top:4px;">Image uploads and product data sync to GitHub. Site auto-deploys on save.</p></div></div>';
    }
    html += '<div class="card"><div class="card-header"><h4>Recent Activity</h4></div><div class="card-body no-padding"><table class="data-table"><thead><tr><th>Type</th><th>Message</th><th>Time</th></tr></thead><tbody>';
    (data.recentActivity || []).slice(0, 10).forEach(function(a){
      html += '<tr><td><span class="status-badge ' + (a.type || 'info') + '">' + (a.type || 'event') + '</span></td><td>' + (a.message || '') + '</td><td class="text-muted text-sm">' + (a.time ? new Date(a.time).toLocaleString() : '') + '</td></tr>';
    });
    if (!data.recentActivity || !data.recentActivity.length) html += '<tr><td colspan="3" class="text-muted" style="text-align:center;padding:24px;">No recent activity</td></tr>';
    html += '</tbody></table></div></div>';
    html += '<div class="card"><div class="card-body"><p class="text-muted text-sm">Uptime: ' + formatUptime(data.uptime || 0) + ' | ' + (data.serverTime ? new Date(data.serverTime).toLocaleString() : '') + '</p></div></div>';
    el.innerHTML = html;
  }).catch(function(){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u25C9</div><h4>Dashboard Unavailable</h4><p class="sub">Could not load data.</p></div>';
  });
}

function formatUptime(sec) {
  var h = Math.floor(sec / 3600);
  var m = Math.floor((sec % 3600) / 60);
  var s = sec % 60;
  return h + 'h ' + m + 'm ' + s + 's';
}

// ═══ CATEGORIES ═══
function renderCategories(el) {
  api('/api/admin/products').then(function(products){
    if (!products || !Array.isArray(products)) products = [];
    var catCounts = {};
    products.forEach(function(p){
      var cat = (p.category || '').trim() || 'Uncategorized';
      if (!catCounts[cat]) catCounts[cat] = 0;
      catCounts[cat]++;
    });
    var catNames = Object.keys(catCounts).sort();
    var html = '<div class="section-header"><h3>Categories (' + catNames.length + ')</h3><button class="btn-admin btn-primary-admin btn-sm-admin" onclick="showAddCategory()">+ Add Category</button></div>';
    html += '<div class="card"><div class="card-body no-padding"><table class="data-table"><thead><tr><th>Category Name</th><th>Products</th><th></th></tr></thead><tbody>';
    catNames.forEach(function(cat){
      html += '<tr><td style="font-weight:600;">' + cat + '</td><td><span class="status-badge active">' + catCounts[cat] + ' product' + (catCounts[cat] !== 1 ? 's' : '') + '</span></td>';
      html += '<td class="td-actions"><div class="flex gap-8">';
      html += '<button class="btn-admin btn-xs-admin btn-secondary-admin" onclick="showAddProduct(\'' + cat.replace(/'/g, "\\'") + '\')">+ Add Product</button>';
      if (catCounts[cat] === 0) {
        html += '<button class="btn-admin btn-xs-admin btn-danger-admin" onclick="deleteCategoryAdmin(\'' + cat.replace(/'/g, "\\'") + '\')">Delete</button>';
      }
      html += '</div></td></tr>';
    });
    if (!catNames.length) html += '<tr><td colspan="3" class="text-muted" style="text-align:center;padding:24px;">No categories yet. Add your first category to get started.</td></tr>';
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
  }).catch(function(err){
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">⊞</div><h4>Failed to Load</h4><p class="sub">' + err.message + '</p></div>';
  });
}

function showAddCategory() {
  openModal('<h3>Add New Category</h3>' +
    '<div class="form-group"><label>Category Name *</label><input id="newCatName" placeholder="e.g. Necklace Sets, Payal" /></div>' +
    '<p class="text-muted text-sm" style="margin-bottom:16px;">Enter the category name, then you\'ll be taken to add your first product in this category.</p>' +
    '<button class="btn-admin btn-primary-admin" onclick="saveCategory()">Create & Add Product</button>');
}

function saveCategory() {
  var name = document.getElementById('newCatName').value.trim();
  if (!name) { toast('Category name is required', 'error'); return; }
  closeModal();
  showAddProduct(name);
}

function deleteCategoryAdmin(catName) {
  if (!confirm('Delete the "' + catName + '" category?')) return;
  var products = STATE.products.filter(function(p){ return (p.category || '').trim() === catName; });
  if (products.length) { toast('Cannot delete category with products', 'error'); return; }
  toast('Category will be removed on next product load', 'success');
  navigateTo('categories');
}

// ═══ PRODUCTS ═══
function renderProducts(el) {
  api('/api/admin/products').then(function(products){
    if (!products || !Array.isArray(products)) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u25C8</div><h4>No Products</h4><p class="sub">Could not load products.</p></div>'; return; }
    STATE.products = products;

    var catMap = {};
    var catOrder = [];
    products.forEach(function(p){
      var cat = (p.category || '').trim() || 'Uncategorized';
      if (!catMap[cat]) { catMap[cat] = []; catOrder.push(cat); }
      catMap[cat].push(p);
    });

    var html = '<div class="section-header"><h3>All Products (' + products.length + ')</h3><button class="btn-admin btn-primary-admin btn-sm-admin" onclick="showAddProduct()">+ Add Product</button></div>';

    catOrder.forEach(function(cat){
      var items = catMap[cat];
      html += '<div class="card" style="margin-bottom:24px;">';
      html += '<div class="card-header" style="cursor:pointer;" onclick="this.parentElement.querySelector(\'.cat-body\').classList.toggle(\'hidden\');this.querySelector(\'.cat-toggle\').textContent = this.parentElement.querySelector(\'.cat-body\').classList.contains(\'hidden\') ? \'+\' : \'\u2212\'">';
      html += '<div style="display:flex;align-items:center;gap:12px;">';
      html += '<span class="cat-toggle" style="font-size:1.1rem;color:var(--admin-accent);width:20px;text-align:center;">\u2212</span>';
      html += '<h4 style="font-size:0.95rem;">' + cat + '</h4>';
      html += '<span style="font-size:0.65rem;color:var(--admin-text-muted);background:rgba(13,139,139,0.1);padding:3px 10px;border-radius:12px;">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '</span>';
      html += '</div>';
      html += '<button class="btn-admin btn-primary-admin btn-xs-admin" onclick="event.stopPropagation();showAddProduct(\'' + cat.replace(/'/g, "\\'") + '\')">+ Add to ' + cat + '</button>';
      html += '<button class="btn-admin btn-danger-admin btn-xs-admin" onclick="event.stopPropagation();deleteCategory(\'' + cat.replace(/'/g, "\\'") + '\',' + items.length + ')">Delete</button>';
      html += '</div>';
      html += '<div class="cat-body">';
      html += '<div class="card-body no-padding"><table class="data-table"><thead><tr><th>Image</th><th>Name</th><th>Price</th><th class="th-stock">Stock</th><th class="th-status">Status</th><th></th></tr></thead><tbody>';

      items.forEach(function(p){
        var stock = p.stock !== undefined ? p.stock : 'N/A';
        var status = (stock > 0 || stock === 'N/A') ? 'active' : 'out_of_stock';
        var imgSrc = p.image ? (p.image.startsWith('data:') || p.image.startsWith('/uploads') || p.image.startsWith('http') ? p.image : '../' + p.image) : '';
        var thumbHtml = imgSrc ? '<img src="' + imgSrc + '" style="width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;" onerror="this.style.display=\'none\'" />' : '<span style="width:40px;height:40px;display:inline-block;flex-shrink:0;background:var(--admin-surface-2);border-radius:4px;"></span>';
        var variantInfo = (p.variants && p.variants.length > 0) ? '<span style="font-size:0.6rem;color:var(--admin-accent-light);background:rgba(13,139,139,0.1);padding:2px 6px;border-radius:8px;margin-left:6px;">' + p.variants.length + ' color' + (p.variants.length > 1 ? 's' : '') + '</span>' : '';
        html += '<tr><td>' + thumbHtml + '</td><td>' + (p.name || 'Unnamed') + variantInfo + '</td><td>\u00A3' + (p.price || 0).toFixed(2) + '</td><td class="td-stock">' + stock + '</td><td class="td-status"><span class="status-badge ' + status + '">' + (status === 'active' ? 'Active' : 'Out of Stock') + '</span></td><td class="td-actions"><div class="flex gap-8"><button class="btn-admin btn-xs-admin btn-secondary-admin" onclick="editProduct(' + p.id + ')">Edit</button><button class="btn-admin btn-xs-admin btn-danger-admin" onclick="deleteProduct(' + p.id + ')">Delete</button></div></td></tr>';
      });

      html += '</tbody></table></div></div></div>';
    });

    if (!products.length) {
      html += '<div class="empty-state"><div class="empty-icon">\u25C8</div><h4>No Products Yet</h4><p class="sub">Add your first product to get started.</p></div>';
    }

    el.innerHTML = html;
  }).catch(function(err) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u25C8</div><h4>Failed to Load</h4><p class="sub">' + err.message + '</p></div>';
  });
}

function previewProductImage(event) {
  var files = event.target.files;
  if (!files || !files.length) return;
  var preview = document.getElementById('prodImagePreview');
  if (!preview) return;
  preview.innerHTML = '';
  Array.from(files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'max-width:120px;max-height:120px;border-radius:8px;border:1px solid var(--admin-border);object-fit:cover;';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

    '<div><label>Color Code</label><input type="text" id="vColorHex_' + idx + '" value="' + colorHex + '" placeholder="#000000" onchange="document.getElementById(\'vColorInput_' + idx + '\').value=this.value;document.querySelector(\'#variant_' + idx + ' .variant-color-swatch\').style.background=this.value;" /></div>' +

    '<div><label>Price (\u00A3)</label><input type="number" step="0.01" id="vPrice_' + idx + '" value="' + (v.price || '') + '" placeholder="Same as product" /></div>' +
    '<div><label>Stock</label><input type="number" id="vStock_' + idx + '" value="' + (v.stock !== undefined ? v.stock : '') + '" placeholder="0" /></div>' +
    '<div><label>SKU</label><input type="text" id="vSku_' + idx + '" value="' + (v.sku || '').replace(/"/g, '&quot;') + '" placeholder="Auto" /></div>' +

function removeVariantRow(idx) {
  var row = document.getElementById('variant_' + idx);
  if (row) row.remove();
}
function previewVariantImage(idx, input) {
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();

    var existing = document.getElementById('vImgPreview_' + idx);

      var img = row.querySelector('.variant-img-preview');

    }

}

function saveProduct(id) {
  var btn = document.getElementById('saveProductBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  var name = document.getElementById('prodName').value.trim();
  var categorySelect = document.getElementById('prodCategorySelect');
  var categoryNew = document.getElementById('prodCategoryNew');
  var category = '';
  if (categorySelect) {
    category = categorySelect.value === '__new__' ? (categoryNew ? categoryNew.value.trim() : '') : categorySelect.value;
  }
  var price = parseFloat(document.getElementById('prodPrice').value) || 0;
  var stock = parseInt(document.getElementById('prodStock').value) || 0;
  var description = document.getElementById('prodDesc').value.trim();
  var badge = document.getElementById('prodBadge').value.trim();
  if (!name) { toast('Product name is required', 'error'); if(btn) { btn.disabled = false; btn.textContent = 'Save Product'; } return; }
  if (!category) { toast('Please select or enter a category', 'error'); if(btn) { btn.disabled = false; btn.textContent = 'Save Product'; } return; }

  var fileInput = document.getElementById('prodImageInput');
  var files = fileInput && fileInput.files ? Array.from(fileInput.files) : [];

  function collectVariants() {
    var rows = document.getElementById('variantRows');
    if (!rows) return [];
    var variants = [];
    rows.querySelectorAll('.variant-row').forEach(function(row) {
      var idStr = row.id.replace('variant_', '');
      var color = (document.getElementById('vColorName_' + idStr) || {}).value || '';
      var colorHex = (document.getElementById('vColorHex_' + idStr) || {}).value || '';
      var priceEl = document.getElementById('vPrice_' + idStr);
      var stockEl = document.getElementById('vStock_' + idStr);
      var sku = (document.getElementById('vSku_' + idStr) || {}).value || '';
      var fileInput = document.getElementById('vImageInput_' + idStr);
      var file = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
      if (!color.trim()) return;
      variants.push({
        color: color.trim(),
        colorHex: colorHex || '#000000',
        price: priceEl ? parseFloat(priceEl.value) || 0 : 0,
        stock: stockEl ? parseInt(stockEl.value) || 0 : 0,
        sku: sku.trim(),
        _file: file
      });
    });
    return variants;
  }

  function doSaveSingle(image, cb, errCb) {
    var variants = collectVariants();
    var filesToUpload = variants.filter(function(v) { return v._file; });

    function uploadVariantFiles(variantList, idx, doneCb) {
      if (idx >= variantList.length) { doneCb(); return; }
      var v = variantList[idx];
      if (!v._file) { uploadVariantFiles(variantList, idx + 1, doneCb); return; }
      compressImage(v._file, 800, 0.7).then(function(base64) {
        if (!base64) { uploadVariantFiles(variantList, idx + 1, doneCb); return; }
        api('/api/admin/upload', { method: 'POST', body: { image: base64, name: name + ' ' + v.color } }).then(function(uploadResult) {
          if (uploadResult && uploadResult.success && uploadResult.url) {
            v.image = uploadResult.url;
          }
          delete v._file;
          uploadVariantFiles(variantList, idx + 1, doneCb);
        }).catch(function() {
          v.image = base64;
          delete v._file;
          uploadVariantFiles(variantList, idx + 1, doneCb);
        });
      });
    }

    uploadVariantFiles(filesToUpload, 0, function() {
      variants.forEach(function(v) { delete v._file; });
      var body = {};
      if (id) body.id = id;
      body.name = name;
      body.category = category || 'Uncategorized';
      body.price = price;
      body.stock = stock;
      body.description = description;
      body.badge = badge;
      if (image !== undefined) body.image = image;
      if (variants.length) body.variants = variants;

      var method = id ? 'PUT' : 'POST';
      toast('Saving product…', 'info');
      api('/api/admin/products', { method: method, body: body }).then(function(data){
        if (data && data.success) { toast('Product saved', 'success'); if (cb) cb(); }
        else { toast('Save failed: ' + (data && data.error ? data.error : 'unknown'), 'error'); if(errCb) errCb(); }
      }).catch(function(err) {
        toast('Save error: ' + err.message, 'error');
        if(errCb) errCb();
      });
    });
  }

  function uploadAndSaveFile(file, cb, errCb) {
    compressImage(file, 800, 0.7).then(function(base64) {
      if (!base64) { toast('Failed to process image', 'error'); if(errCb) errCb(); return; }
      var sizeKB = Math.round(base64.length * 3 / 4 / 1024);
      log('Compressed image: ' + sizeKB + 'KB');
      toast('Uploading image…', 'info');
      api('/api/admin/upload', { method: 'POST', body: { image: base64, name: name } }).then(function(uploadResult) {
        log('Upload result: ' + JSON.stringify(uploadResult));
        if (uploadResult && uploadResult.success && uploadResult.url) {
          toast('Image uploaded (' + (uploadResult.sizeKB || '?') + 'KB)', 'success');
          cb(uploadResult.url);
        } else if (uploadResult && uploadResult.configured === false) {
          log('GitHub not configured — saving image inline');
          cb(base64);
        } else {
          toast('Upload failed — saving image inline', 'error');
          cb(base64);
        }
      }).catch(function(err) {
        log('Upload API error: ' + err.message);
        toast('Upload unavailable — saving image inline', 'error');
        cb(base64);
      });
    });
  }

  if (files.length > 0) {
    if (id) {
      uploadAndSaveFile(files[0], function(url) {
        doSaveSingle(url, function() {
          toast('Product updated', 'success'); closeModal(); navigateTo('products');
        }, function() {
          if(btn) { btn.disabled = false; btn.textContent = 'Save'; }
        });
      });
    } else {
      var idx = 0;
      var created = 0, failed = 0;
      function uploadNext() {
        if (idx >= files.length) {
          toast(created + ' product(s) created' + (failed ? ', ' + failed + ' failed' : ''), failed ? 'error' : 'success');
          closeModal(); navigateTo('products');
          return;
        }
        var file = files[idx];
        idx++;
        uploadAndSaveFile(file, function(url) {
          var body = { name: name, category: category || 'Uncategorized', price: price, stock: stock, description: description, badge: badge };
          if (url) body.image = url;
          api('/api/admin/products', { method: 'POST', body: body }).then(function(data) {
            if (data && data.success) created++; else failed++;
            uploadNext();
          }).catch(function() { failed++; uploadNext(); });
        }, function() { failed++; uploadNext(); });
      }
      uploadNext();
    }
  } else {
    doSaveSingle(undefined, function() {
      toast(id ? 'Product updated' : 'Product added', 'success'); closeModal(); navigateTo('products');
    }, function() {
      if(btn) { btn.disabled = false; btn.textContent = 'Save Product'; }
    });
  }
}

function deleteProduct(id) {
  if (!confirm('Are you sure you want to delete this product?')) return;
  api('/api/admin/products?id=' + id, { method: 'DELETE' }).then(function(data){
    if (data && data.success) { toast('Product deleted', 'success'); closeModal(); navigateTo('products'); } else { toast('Delete failed: ' + (data && data.error ? data.error : 'unknown'), 'error'); }
  }).catch(function(err) { toast('Delete error: ' + err.message, 'error'); });
}

function deleteCategory(catName, count) {
  if (!confirm('Delete the "' + catName + '" category and all ' + count + ' product(s) in it? This cannot be undone.')) return;
  var products = STATE.products.filter(function(p){ var c = (p.category || '').trim() || 'Uncategorized'; return c === catName; });
  var deleted = 0;
  var failed = 0;
  var total = products.length;
  if (!total) { toast('No products found in ' + catName, 'error'); return; }
  products.forEach(function(p){
    api('/api/admin/products?id=' + p.id, { method: 'DELETE' }).then(function(data){
      if (data && data.success) deleted++; else failed++;
      if (deleted + failed === total) {
        toast(deleted + ' product(s) deleted' + (failed ? ', ' + failed + ' failed' : ''), failed ? 'error' : 'success');
        navigateTo('products');
      }
    }).catch(function() { failed++; if (deleted + failed === total) { toast(deleted + ' deleted, ' + failed + ' failed', 'error'); navigateTo('products'); } });
  });
}

function renderOrders(el) {
  api('/api/admin/orders').then(function(orders) {
    if (!orders || !orders.length) { el.innerHTML = '<div class="section-header"><h3>Orders</h3><button class="btn-admin btn-primary-admin" onclick="showAddOrder()">+ New Order</button></div><div class="empty-state"><div class="empty-icon">◈</div><h4>No Orders Yet</h4><p class="sub">Orders will appear here once customers start purchasing.</p></div>'; return; }
    var stats = { total: orders.length, pending: 0, confirmed: 0, shipped: 0, delivered: 0, cancelled: 0, totalRevenue: 0 };
    orders.forEach(function(o) { if (stats[o.status] !== undefined) stats[o.status]++; stats.totalRevenue += o.total || 0; });
    var html = '<div class="section-header"><h3>Orders</h3><button class="btn-admin btn-primary-admin" onclick="showAddOrder()">+ New Order</button></div>';
    html += '<div class="dash-grid">';
    html += '<div class="dash-card"><div class="dash-icon">◈</div><div class="dash-label">Total Orders</div><div class="dash-value">' + stats.total + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">\u23F3</div><div class="dash-label">Pending</div><div class="dash-value">' + stats.pending + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">◆</div><div class="dash-label">Shipped</div><div class="dash-value">' + stats.shipped + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">\u00A3</div><div class="dash-label">Revenue</div><div class="dash-value">\u00A3' + stats.totalRevenue.toFixed(2) + '</div></div>';
    html += '</div>';
    html += '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">';
    ['all','pending','confirmed','shipped','delivered','cancelled'].forEach(function(s) {
      html += '<button class="btn-admin btn-sm' + (s === 'all' ? ' btn-primary-admin' : '') + '" onclick="filterOrders(\'' + s + '\')">' + s.charAt(0).toUpperCase() + s.slice(1) + '</button>';
    });
    html += '</div>';
    html += '<div class="card"><div class="card-body no-padding"><table class="data-table"><thead><tr><th>#</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
    orders.sort(function(a,b){ return new Date(b.createdAt) - new Date(a.createdAt); });
    orders.forEach(function(o) {

      html += '<tr>';

      html += '<td><div>' + (o.customerName || 'Unknown') + '</div><div class="text-sm text-muted">' + (o.customerEmail || '') + '</div></td>';
      html += '<td>' + itemCount + ' item' + (itemCount !== 1 ? 's' : '') + '</td>';

      html += '<td><span class="status-badge ' + (o.status || 'pending') + '">' + (o.status || 'pending') + '</span></td>';
      html += '<td class="text-sm text-muted">' + (o.createdAt ? new Date(o.createdAt).toLocaleDateString() : '') + '</td>';
      html += '<td><button class="btn-admin btn-sm" onclick="editOrder(' + o.id + ')">Edit</button> <button class="btn-admin btn-sm btn-danger-admin" onclick="deleteOrder(' + o.id + ')">×</button></td>';

    list.forEach(function(r) {
      var stars = '';
      for (var i = 0; i < 5; i++) stars += i < r.rating ? '★' : '☆';
      html += '<tr><td><div>' + (r.customerName || 'Anonymous') + '</div><div class="text-sm text-muted">' + (r.customerEmail || '') + '</div></td><td class="text-sm">' + (r.productName || 'N/A') + '</td><td style="color:#f1c40f;">' + stars + '</td><td class="text-sm" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">' + (r.title ? '<strong>' + r.title + '</strong> ' : '') + (r.body || '') + '</td><td><span class="status-badge ' + (r.status || 'pending') + '">' + (r.status || 'pending') + '</span></td><td class="text-sm text-muted">' + (r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '') + '</td><td><button class="btn-admin btn-sm" onclick="editReview(' + r.id + ')">Edit</button> <button class="btn-admin btn-sm btn-danger-admin" onclick="deleteReview(' + r.id + ')">×</button></td></tr>';
    });
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
  }).catch(function(err) { el.innerHTML = '<div class="empty-state"><h4>Error loading reviews</h4><p class="sub">' + err.message + '</p></div>'; });
}

function showAddReview() {
  openModal('<h3>Add Review</h3>' +
    '<div class="form-row"><div class="form-group"><label>Customer Name</label><input id="revName" placeholder="Name" /></div><div class="form-group"><label>Email</label><input id="revEmail" type="email" placeholder="Email" /></div></div>' +
    '<div class="form-row"><div class="form-group"><label>Product Name</label><input id="revProduct" placeholder="Product name" /></div><div class="form-group"><label>Rating (1-5)</label><select id="revRating"><option value="5">5 ★★★★★</option><option value="4">4 ★★★★☆</option><option value="3">3 ★★★☆☆</option><option value="2">2 ★★☆☆☆</option><option value="1">1 ★☆☆☆☆</option></select></div></div>' +
    '<div class="form-group"><label>Title</label><input id="revTitle" placeholder="Review title" /></div>' +
    '<div class="form-group"><label>Review</label><textarea id="revBody" rows="3" placeholder="Review text"></textarea></div>' +
    '<button class="btn-admin btn-primary-admin" onclick="saveReview()">Save Review</button>');
}

function editReview(id) {
  api('/api/admin/reviews?id=' + id).then(function(r) {
    if (!r || !r.id) { toast('Review not found', 'error'); return; }
    openModal('<h3>Edit Review</h3>' +
      '<div class="form-group"><label>Customer</label><div class="text-sm text-muted">' + (r.customerName || 'Anonymous') + ' (' + (r.customerEmail || '') + ')</div></div>' +
      '<div class="form-group"><label>Product</label><div class="text-sm text-muted">' + (r.productName || 'N/A') + '</div></div>' +
      '<div class="form-row"><div class="form-group"><label>Rating</label><select id="revRating"><option value="5"' + (r.rating === 5 ? ' selected' : '') + '>5 ★★★★★</option><option value="4"' + (r.rating === 4 ? ' selected' : '') + '>4 ★★★★☆</option><option value="3"' + (r.rating === 3 ? ' selected' : '') + '>3 ★★★☆☆</option><option value="2"' + (r.rating === 2 ? ' selected' : '') + '>2 ★★☆☆☆</option><option value="1"' + (r.rating === 1 ? ' selected' : '') + '>1 ★☆☆☆☆</option></select></div><div class="form-group"><label>Status</label><select id="revStatus"><option value="pending"' + (r.status === 'pending' ? ' selected' : '') + '>Pending</option><option value="approved"' + (r.status === 'approved' ? ' selected' : '') + '>Approved</option><option value="rejected"' + (r.status === 'rejected' ? ' selected' : '') + '>Rejected</option></select></div></div>' +
      '<div class="form-group"><label>Title</label><input id="revTitle" value="' + (r.title || '').replace(/"/g, '&quot;') + '" /></div>' +
      '<div class="form-group"><label>Review</label><textarea id="revBody" rows="3">' + (r.body || '') + '</textarea></div>' +
      '<button class="btn-admin btn-primary-admin" onclick="saveReview(' + r.id + ')">Save Changes</button> ' +
      '<button class="btn-admin btn-danger-admin" onclick="deleteReview(' + r.id + ')">Delete Review</button>');
  });
}

function saveReview(id) {
  var body = {
    rating: parseInt(document.getElementById('revRating').value) || 5,
    title: (document.getElementById('revTitle').value || '').trim(),
    body: (document.getElementById('revBody').value || '').trim()
  };
  if (id) { body.id = id; body.status = document.getElementById('revStatus') ? document.getElementById('revStatus').value : 'pending'; }
  else {
    body.customerName = (document.getElementById('revName').value || '').trim() || 'Anonymous';
    body.customerEmail = (document.getElementById('revEmail').value || '').trim();
    body.productName = (document.getElementById('revProduct').value || '').trim();
  }
  api('/api/admin/reviews', { method: id ? 'PUT' : 'POST', body: body }).then(function(data) {
    if (data && data.success) { toast(id ? 'Review updated' : 'Review added', 'success'); closeModal(); navigateTo('reviews'); }
    else { toast('Failed: ' + (data && data.error ? data.error : 'unknown'), 'error'); }
  }).catch(function(err) { toast('Error: ' + err.message, 'error'); });
}

function deleteReview(id) {
  if (!confirm('Delete this review?')) return;
  api('/api/admin/reviews?id=' + id, { method: 'DELETE' }).then(function(data) {
    if (data && data.success) { toast('Review deleted', 'success'); closeModal(); navigateTo('reviews'); }
    else { toast('Delete failed', 'error'); }
  }).catch(function(err) { toast('Error: ' + err.message, 'error'); });
}

// ═══ CONTACTS / ENQUIRIES ═══
function renderContacts(el) {
  api('/api/admin/contacts').then(function(list) {
    var subs = list || [];
    var unread = subs.filter(function(s){ return !s.read; }).length;
    var html = '<div class="section-header"><h3>Enquiries</h3></div>';
    html += '<div class="dash-grid">';
    html += '<div class="dash-card"><div class="dash-icon">✉</div><div class="dash-label">Total Enquiries</div><div class="dash-value">' + subs.length + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">\u25C6</div><div class="dash-label">Unread</div><div class="dash-value">' + unread + '</div></div>';
    html += '</div>';
    html += '<div class="card"><div class="card-body no-padding"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    if (!subs.length) html += '<tr><td colspan="7" class="text-muted" style="text-align:center;padding:24px;">No enquiries yet. Submissions from the contact form will appear here.</td></tr>';
    subs.forEach(function(s) {
      html += '<tr style="' + (!s.read ? 'font-weight:600;' : '') + '">';
      html += '<td>' + (s.name || '') + '</td>';
      html += '<td class="text-sm">' + (s.email || '') + '</td>';
      html += '<td class="text-sm">' + (s.subject || '') + '</td>';
      html += '<td class="text-sm" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">' + (s.message || '') + '</td>';
      html += '<td class="text-sm text-muted">' + (s.createdAt ? new Date(s.createdAt).toLocaleDateString() : '') + '</td>';
      html += '<td><span class="status-badge ' + (s.replied ? 'active' : (s.read ? 'confirmed' : 'pending')) + '">' + (s.replied ? 'Replied' : (s.read ? 'Read' : 'Unread')) + '</span></td>';
      html += '<td><button class="btn-admin btn-sm" onclick="viewContact(\'' + s.id + '\')">View</button> <button class="btn-admin btn-sm btn-danger-admin" onclick="deleteContact(\'' + s.id + '\')">×</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
  }).catch(function(err) { el.innerHTML = '<div class="empty-state"><h4>Error loading enquiries</h4><p class="sub">' + err.message + '</p></div>'; });
}

function viewContact(id) {
  api('/api/admin/contacts?id=' + id).then(function(s) {
    if (!s) { toast('Not found', 'error'); return; }
    api('/api/admin/contacts', { method: 'PUT', body: { id: id, read: true } });
    openModal('<h3>Enquiry</h3>' +
      '<div class="form-group"><label>From</label><div>' + (s.name || '') + ' &lt;' + (s.email || '') + '&gt;</div></div>' +
      '<div class="form-group"><label>Subject</label><div>' + (s.subject || 'No subject') + '</div></div>' +
      '<div class="form-group"><label>Date</label><div class="text-sm text-muted">' + (s.createdAt ? new Date(s.createdAt).toLocaleString() : '') + '</div></div>' +
      '<div class="form-group"><label>Message</label><div style="background:#111;padding:12px;border-radius:6px;white-space:pre-wrap;">' + (s.message || '') + '</div></div>' +
      '<div class="form-group"><label>Notes</label><textarea id="contactNotes" rows="2" placeholder="Internal notes">' + (s.notes || '') + '</textarea></div>' +
      '<div style="display:flex;gap:8px;">' +
        '<button class="btn-admin btn-primary-admin" onclick="updateContact(\'' + id + '\', true)">Mark Replied</button>' +
        '<button class="btn-admin btn-danger-admin" onclick="deleteContact(\'' + id + '\')">Delete</button>' +
      '</div>');
  });
}

function updateContact(id, replied) {
  var notes = document.getElementById('contactNotes') ? document.getElementById('contactNotes').value : '';
  api('/api/admin/contacts', { method: 'PUT', body: { id: id, replied: replied, notes: notes, read: true } }).then(function() {
    toast(replied ? 'Marked as replied' : 'Updated', 'success'); closeModal(); navigateTo('contacts');
  });
}

function deleteContact(id) {
  if (!confirm('Delete this enquiry?')) return;
  api('/api/admin/contacts?id=' + id, { method: 'DELETE' }).then(function(data) {
    if (data && data.success) { toast('Deleted', 'success'); closeModal(); navigateTo('contacts'); }
    else { toast('Delete failed', 'error'); }
  }).catch(function(err) { toast('Error: ' + err.message, 'error'); });
}

// ═══ PAYMENTS ═══
function renderPayments(el) {
  api('/api/admin/payments').then(function(data){
    if (!data) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u25C8</div><h4>No Payments</h4><p class="sub"></p></div>'; return; }
    var bal = data.balance || {};
    var payments = data.recentPayments || [];
    var html = '<div class="section-header"><h3>Payments (Stripe)</h3></div>';
    html += '<div class="dash-grid">';
    html += '<div class="dash-card"><div class="dash-icon">\u00A3</div><div class="dash-label">Available Balance</div><div class="dash-value">' + (bal.currency || 'gbp').toUpperCase() + ' ' + (bal.available || 0).toFixed(2) + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">\u23F3</div><div class="dash-label">Pending Balance</div><div class="dash-value">' + (bal.currency || 'gbp').toUpperCase() + ' ' + (bal.pending || 0).toFixed(2) + '</div></div>';
    html += '<div class="dash-card"><div class="dash-icon">\u25C8</div><div class="dash-label">Recent Charges</div><div class="dash-value">' + payments.length + '</div></div>';
    html += '</div>';
    html += '<div class="card"><div class="card-header"><h4>Recent Charges</h4></div><div class="card-body no-padding"><table class="data-table"><thead><tr><th>ID</th><th>Amount</th><th>Status</th><th>Email</th><th>Date</th></tr></thead><tbody>';
    payments.forEach(function(p){
      html += '<tr><td class="font-mono text-sm">' + (p.id || '').slice(0,14) + '...</td><td>\u00A3' + (p.amount || 0).toFixed(2) + '</td><td><span class="status-badge ' + (p.status || 'pending') + '">' + (p.status || 'pending') + '</span></td><td class="text-sm text-muted">' + (p.email || '') + '</td><td class="text-sm text-muted">' + (p.created ? new Date(p.created).toLocaleDateString() : '') + '</td></tr>';
    });
    if (!payments.length) html += '<tr><td colspan="5" class="text-muted" style="text-align:center;padding:24px;">No payments yet</td></tr>';
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
  }).catch(function(err) { el.innerHTML = '<div class="empty-state"><h4>Error loading payments</h4><p class="sub">' + err.message + '</p></div>'; });
}

// ═══ SHIPPING ═══
function renderShipping(el) {
  api('/api/admin/shipping').then(function(data){
    if (!data) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u229E</div><h4>No Data</h4><p class="sub"></p></div>'; return; }
    var zones = data.zones || [];
    var countryToZone = data.countryToZone || {};
    var html = '<div class="section-header"><h3>Shipping Zones (Royal Mail)</h3></div>';
    html += '<div class="card"><div class="card-header"><h4>' + (data.service || 'Royal Mail') + '</h4></div><div class="card-body no-padding"><table class="data-table"><thead><tr><th>Zone</th><th>Rate</th><th>Delivery</th><th>Countries</th></tr></thead><tbody>';
    zones.forEach(function(z) {
      var countries = [];
      Object.keys(countryToZone).forEach(function(code) {
        if (countryToZone[code] === z.id) countries.push(code);
      });
      html += '<tr><td>' + z.name + '</td><td>\u00A3' + z.rate.toFixed(2) + '</td><td class="text-sm text-muted">' + z.deliveryEstimate + '</td><td class="text-sm text-muted">' + countries.join(', ') + '</td></tr>';
    });
    html += '</tbody></table></div></div>';
    el.innerHTML = html;
  }).catch(function(err) { el.innerHTML = '<div class="empty-state"><h4>Error loading shipping</h4><p class="sub">' + err.message + '</p></div>'; });
}

// ═══ SETTINGS ═══
function renderSettings(el) {
  api('/api/admin/settings').then(function(data){
    if (!data) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">\u2699</div><h4>No Settings</h4><p class="sub"></p></div>'; return; }
    var html = '<div class="section-header"><h3>Settings</h3></div>';
    html += '<div class="card"><div class="card-header"><h4>Store Information</h4></div><div class="card-body"><div class="form-group"><label>Store Name</label><input id="sName" value="' + (data.storeName || 'J JEWELLERS') + '" /></div>';
    html += '<div class="form-group"><label>Support Email</label><input id="sEmail" value="' + (data.supportEmail || '') + '" /></div>';
    html += '<div class="form-group"><label>Phone</label><input id="sPhone" value="' + (data.phone || '') + '" /></div>';
    html += '<button class="btn-admin btn-primary-admin" onclick="saveSettings()">Save Settings</button></div></div>';
    html += '<div class="card"><div class="card-header"><h4>Admin</h4></div><div class="card-body"><button class="btn-admin btn-danger-admin" onclick="logoutAdmin()">Sign Out</button></div></div>';
    el.innerHTML = html;
  }).catch(function(err) { el.innerHTML = '<div class="empty-state"><h4>Error loading settings</h4><p class="sub">' + err.message + '</p></div>'; });
}

function saveSettings() {
  var body = {
    storeName: document.getElementById('sName').value,
    supportEmail: document.getElementById('sEmail').value,
    phone: document.getElementById('sPhone').value
  };
  api('/api/admin/settings', { method: 'PUT', body: body }).then(function(data){
    if (data && data.success) { toast('Settings saved', 'success'); } else { toast('Save failed', 'error'); }
  });
}

// ═══ TOAST ═══
function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast-admin ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}

// ═══ MODAL ═══
function openModal(html) { document.getElementById('modalContent').innerHTML = html + '<button class="close-modal" onclick="closeModal()">\u2715</button>'; document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ═══ EVENT LISTENERS ═══
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  loginAdmin(u, p);
});

// ═══ BOOT ═══
// Check for saved token on page load
var savedToken = localStorage.getItem('jj_admin_token');
if (savedToken) {
  log('Found saved token, verifying…');
  STATE.token = savedToken;
  api('/api/admin/login', { method: 'POST', body: { action: 'check' } }).then(function(data){
    if (data && data.success) {
      log('Saved token is valid, entering dashboard');
      enterDashboard();
    } else {
      log('Saved token invalid, showing login');
      STATE.token = '';
      localStorage.removeItem('jj_admin_token');
    }
  }).catch(function(){
    log('Token check failed (network), staying on login');
    STATE.token = '';
    localStorage.removeItem('jj_admin_token');
  });
} else {
  log('No saved token, showing login screen');
}
</script>
